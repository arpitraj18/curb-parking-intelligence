<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>CURB — Curb Intelligence Console · Bengaluru</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0E1626; --panel:#141E2F; --panel2:#18233700; --raise:#1B2840;
  --line:#26344C; --line2:#1F2C42;
  --text:#E7EEF7; --muted:#8A9BB4; --dim:#5E6F8A;
  --signal:#FFC23D;            /* one bold accent: traffic caution amber */
  --c-commuter:#4C9BE6; --c-delivery:#F0A93B; --c-hire:#9B7BE6;
  --c-safety:#E5564B; --c-structural:#3FB984; --c-enforce:#7C8DA6;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:var(--ink); color:var(--text);
  font-family:"IBM Plex Sans",system-ui,sans-serif; overflow:hidden;
}
.mono{font-family:"IBM Plex Mono",monospace}
/* ---------- header ---------- */
header{
  position:fixed; inset:0 0 auto 0; height:62px; z-index:1200;
  display:flex; align-items:center; gap:18px; padding:0 18px;
  background:linear-gradient(180deg,#0E1626 60%,#0e162600);
  border-bottom:1px solid var(--line2);
}
.brand{display:flex; align-items:baseline; gap:10px}
.brand .logo{
  font-family:"Archivo",sans-serif; font-weight:800; font-size:26px;
  letter-spacing:.14em; color:var(--text);
}
.brand .logo b{color:var(--signal)}
.brand .tag{font-size:11px; color:var(--muted); letter-spacing:.04em}
.readouts{display:flex; gap:22px; margin-left:auto; flex-wrap:wrap}
.ro{display:flex; flex-direction:column; line-height:1.1}
.ro .v{font-family:"IBM Plex Mono",monospace; font-weight:600; font-size:16px; color:var(--text)}
.ro .v .u{color:var(--muted); font-size:11px; font-weight:500}
.ro .k{font-size:9.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--dim); margin-top:3px}
/* ---------- layout ---------- */
#map{position:fixed; top:62px; left:0; right:392px; bottom:0; background:#0b1220}
.rail{
  position:fixed; top:62px; right:0; bottom:0; width:392px; z-index:1100;
  background:var(--panel); border-left:1px solid var(--line2);
  display:flex; flex-direction:column;
}
.rail-head{padding:14px 16px 10px; border-bottom:1px solid var(--line2)}
.rail-head h2{
  margin:0 0 2px; font-family:"Archivo",sans-serif; font-weight:700;
  font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:var(--text);
}
.rail-head .sub{font-size:11px; color:var(--muted)}
.search{
  margin-top:11px; width:100%; padding:8px 11px; border-radius:8px;
  background:#0F1A2B; border:1px solid var(--line); color:var(--text);
  font-family:inherit; font-size:12.5px;
}
.search::placeholder{color:var(--dim)}
.search:focus{outline:none; border-color:var(--signal)}
.filters{display:flex; flex-wrap:wrap; gap:6px; padding:11px 14px; border-bottom:1px solid var(--line2)}
.flabel{width:100%; font-size:9.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--dim); margin:2px 0}
.chip{
  font-size:11px; padding:4px 10px; border-radius:999px; cursor:pointer;
  border:1px solid var(--line); background:#0F1A2B; color:var(--muted);
  display:inline-flex; align-items:center; gap:6px; user-select:none; transition:.15s;
}
.chip .dot{width:8px; height:8px; border-radius:50%}
.chip.on{color:var(--text); border-color:transparent}
.chip:hover{border-color:var(--muted)}
.list{flex:1; overflow-y:auto; padding:8px 12px 40px}
.list::-webkit-scrollbar{width:8px} .list::-webkit-scrollbar-thumb{background:#26344c; border-radius:8px}
/* ---------- card ---------- */
.card{
  position:relative; display:grid; grid-template-columns:34px 1fr auto; gap:10px;
  padding:11px 12px 11px 14px; margin:7px 0; border-radius:10px;
  background:var(--raise); border:1px solid var(--line2); cursor:pointer; transition:.16s;
  overflow:hidden;
}
.card:before{content:""; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--cc)}
.card:hover{transform:translateY(-1px); border-color:#33456499; background:#1E2C46}
.card.sel{border-color:var(--cc); box-shadow:0 0 0 1px var(--cc)}
.card .rk{font-family:"IBM Plex Mono",monospace; font-weight:600; font-size:15px; color:var(--dim); padding-top:2px}
.card.sel .rk{color:var(--signal)}
.card .nm{font-weight:600; font-size:13px; line-height:1.25; margin-bottom:5px}
.card .cause{font-size:11px; font-weight:500; color:var(--cc)}
.card .fix{font-size:11px; color:var(--muted); margin-top:3px}
.card .note{font-size:10.5px; color:var(--dim); font-style:italic; margin-top:4px}
.card .idx{font-family:"IBM Plex Mono",monospace; font-weight:600; font-size:19px; text-align:right; color:var(--text)}
.card .idxk{font-size:8.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); text-align:right}
.pill{
  display:inline-block; margin-top:6px; font-size:9.5px; font-weight:600; letter-spacing:.08em;
  text-transform:uppercase; padding:2px 7px; border-radius:5px;
}
.pill.Chronic{background:#E5564B22; color:#F0857C; border:1px solid #E5564B55}
.pill.Frequent{background:#F0A93B22; color:#F3BE6B; border:1px solid #F0A93B55}
.pill.Occasional{background:#7C8DA622; color:#A9B7CC; border:1px solid #7C8DA655}
/* ---------- legend + ribbon ---------- */
.legend{
  position:fixed; left:14px; bottom:14px; z-index:1100; background:#0E1626E8;
  border:1px solid var(--line); border-radius:10px; padding:10px 12px; font-size:11px;
}
.legend .lt{font-size:9px; letter-spacing:.16em; text-transform:uppercase; color:var(--dim); margin-bottom:7px}
.legend .row{display:flex; align-items:center; gap:7px; margin:3px 0; color:var(--muted)}
.legend .row .dot{width:9px; height:9px; border-radius:50%}
.ribbon{
  position:fixed; left:50%; top:70px; transform:translateX(-50%); z-index:1300;
  background:var(--signal); color:#1a1300; font-size:11px; font-weight:600;
  padding:4px 12px; border-radius:999px; letter-spacing:.03em; box-shadow:0 4px 16px #0008;
}
.empty{padding:30px 16px; color:var(--muted); font-size:12.5px; line-height:1.6}
.empty code{background:#0F1A2B; padding:2px 6px; border-radius:5px; color:var(--signal); font-size:11.5px}
/* leaflet popup */
.leaflet-popup-content-wrapper{background:#121D2E; color:var(--text); border:1px solid var(--line); border-radius:10px}
.leaflet-popup-tip{background:#121D2E; border:1px solid var(--line)}
.leaflet-popup-content{margin:11px 13px; font-family:"IBM Plex Sans",sans-serif}
.pop h3{margin:0 0 6px; font-size:13px; font-family:"Archivo",sans-serif}
.pop .pc{font-size:11px; margin:2px 0}
.pop .pk{color:var(--dim)}
.leaflet-interactive.sel{animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{stroke-opacity:.9; stroke-width:2} 50%{stroke-opacity:.25; stroke-width:9}}
@media (max-width:820px){
  #map{right:0; bottom:46%}
  .rail{top:auto; width:100%; height:46%; border-left:none; border-top:1px solid var(--line2)}
  .readouts{display:none}
}
@media (prefers-reduced-motion:reduce){
  .leaflet-interactive.sel{animation:none} .card{transition:none}
}
</style>
</head>

const MAPPLS_KEY = "";  // ← paste your Mappls (MapmyIndia) key here for the sponsor basemap; leave "" for dev basemap

const CAUSE = {
  "Commuter overflow":   {c:"var(--c-commuter)",  hex:"#4C9BE6"},
  "Delivery overflow":   {c:"var(--c-delivery)",  hex:"#F0A93B"},
  "Hire / transit demand":{c:"var(--c-hire)",     hex:"#9B7BE6"},
  "Safety risk":         {c:"var(--c-safety)",    hex:"#E5564B"},
  "Structural demand":   {c:"var(--c-structural)",hex:"#3FB984"},
  "Enforcement priority":{c:"var(--c-enforce)",   hex:"#7C8DA6"},
};
const TIERS = ["Chronic","Frequent","Occasional"];

let DATA = EMBED, map, markers = {}, selected = null;
const state = {causes:new Set(), tiers:new Set(), q:""};

// try a live file; fall back to the embedded snapshot
(async function boot(){
  try{
    const r = await fetch("./curb_priorities.json", {cache:"no-store"});
    if(r.ok){ DATA = await r.json(); }
  }catch(e){ /* embedded fallback */ }
  start();
})();

function start(){
  buildReadouts(); buildFilters(); buildLegend();
  document.getElementById("search").addEventListener("input", e=>{ state.q=e.target.value.toLowerCase(); render(); });
  initMap(()=>render());
}

function visible(){
  return DATA.hotspots.filter(h=>{
    if(state.causes.size && !state.causes.has(h.root_cause)) return false;
    if(state.tiers.size && !state.tiers.has(h.persistence_tier)) return false;
    if(state.q && !(h.name||"").toLowerCase().includes(state.q)) return false;
    return true;
  });
}

function buildReadouts(){
  const m=DATA.meta||{}, c=DATA.citywide||{};
  const items=[
    {k:"Hotspots", v:(m.hotspot_count||DATA.hotspots.length).toLocaleString()},
    {k:"Chronic", v:DATA.hotspots.filter(h=>h.persistence_tier==="Chronic").length},
    {k:"Officers / day", v:`${c.officers_per_day_p25||"–"}<span class="u">–</span>${c.officers_per_day_p75||"–"}`},
    {k:"Window", v:`${c.active_days_in_data||"–"}<span class="u"> days</span>`},
  ];
  document.getElementById("readouts").innerHTML = items.map(i=>
    `<div class="ro"><div class="v mono">${i.v}</div><div class="k">${i.k}</div></div>`).join("");
}

function buildFilters(){
  const f=document.getElementById("filters");
  let h=`<div class="flabel">Cause</div>`;
  for(const [name,info] of Object.entries(CAUSE)){
    h+=`<span class="chip" data-type="cause" data-val="${name}" style="--ac:${info.hex}">
        <span class="dot" style="background:${info.hex}"></span>${name.replace(" / "," / ")}</span>`;
  }
  h+=`<div class="flabel" style="margin-top:8px">Persistence</div>`;
  for(const t of TIERS) h+=`<span class="chip" data-type="tier" data-val="${t}">${t}</span>`;
  f.innerHTML=h;
  f.querySelectorAll(".chip").forEach(ch=>ch.addEventListener("click",()=>{
    const set = ch.dataset.type==="cause"?state.causes:state.tiers;
    const v=ch.dataset.val;
    if(set.has(v)){set.delete(v); ch.classList.remove("on"); ch.style.background=""; ch.style.color="";}
    else{set.add(v); ch.classList.add("on");
      const hex = ch.dataset.type==="cause"?CAUSE[v].hex:"#FFC23D";
      ch.style.background=hex+"26"; ch.style.color="#E7EEF7"; ch.style.borderColor=hex+"99";}
    render();
  }));
}

function buildLegend(){
  document.getElementById("legend").innerHTML =
    `<div class="lt">Root cause</div>`+
    Object.entries(CAUSE).map(([n,i])=>`<div class="row"><span class="dot" style="background:${i.hex}"></span>${n}</div>`).join("");
}

function initMap(cb){
  if(MAPPLS_KEY){
    const s=document.createElement("script");
    s.src=`https://apis.mapmyindia.com/advancedmaps/v1/${MAPPLS_KEY}/map_load?v=1.3`;
    s.onload=()=>{ map=new MapmyIndia.Map("map",{center:[12.97,77.59],zoom:11});
      setTimeout(cb,400); };               // MapmyIndia map is Leaflet-based — L.* works on it
    document.head.appendChild(s);
  }else{
    map=L.map("map",{zoomControl:true,renderer:L.svg()}).setView([12.97,77.59],11);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
      {subdomains:"abcd",maxZoom:20,attribution:"© OpenStreetMap © CARTO"}).addTo(map);
    const rb=document.createElement("div"); rb.className="ribbon";
    rb.textContent="Dev basemap — add your Mappls key to use the sponsor map";
    document.body.appendChild(rb);
    cb();
  }
}

function radius(idx){ return 5 + (idx/100)*16; }

function render(){
  const vis=visible();
  // markers
  Object.values(markers).forEach(m=>map.removeLayer(m)); markers={};
  vis.forEach(h=>{
    const info=CAUSE[h.root_cause]||CAUSE["Enforcement priority"];
    const mk=L.circleMarker([h.lat,h.lon],{
      radius:radius(h.congestion_impact_index), color:info.hex, weight:2,
      fillColor:info.hex, fillOpacity:.45
    }).addTo(map);
    mk.bindPopup(popup(h));
    mk.on("click",()=>select(h.rank,false));
    markers[h.rank]=mk;
  });
  // rail
  const list=document.getElementById("list");
  document.getElementById("railsub").textContent =
    `${vis.length} of ${DATA.hotspots.length} shown · ranked by obstruction impact`;
  if(!vis.length){ list.innerHTML=`<div class="empty">No hotspots match these filters. Clear a filter to see more.</div>`; return; }
  list.innerHTML = vis.map(h=>{
    const info=CAUSE[h.root_cause]||CAUSE["Enforcement priority"];
    return `<div class="card" data-rank="${h.rank}" style="--cc:${info.hex}">
      <div class="rk">${h.rank}</div>
      <div>
        <div class="nm">${esc(h.name)}</div>
        <div class="cause">${h.root_cause}</div>
        <div class="fix">→ ${esc(h.recommended_fix)}</div>
        <div class="note">${esc(h.deploy_note)}</div>
        <span class="pill ${h.persistence_tier}">${h.persistence_tier} · ${h.recurrence_days}/${h.window_days} d</span>
      </div>
      <div><div class="idx">${h.congestion_impact_index}</div><div class="idxk">impact</div></div>
    </div>`;}).join("");
  list.querySelectorAll(".card").forEach(c=>c.addEventListener("click",()=>select(+c.dataset.rank,true)));
  if(selected) markCard(selected);
}

function popup(h){
  const info=CAUSE[h.root_cause]||CAUSE["Enforcement priority"];
  return `<div class="pop"><h3>#${h.rank} · ${esc(h.name)}</h3>
    <div class="pc" style="color:${info.hex};font-weight:600">${h.root_cause}</div>
    <div class="pc"><span class="pk">Impact index</span> <b class="mono">${h.congestion_impact_index}</b>/100</div>
    <div class="pc"><span class="pk">Persistence</span> ${h.persistence_tier} (${h.recurrence_days}/${h.window_days} days)</div>
    <div class="pc"><span class="pk">Units seen</span> ~${h.units_typical} typical · ${h.units_peak} peak</div>
    <div class="pc" style="margin-top:5px">→ ${esc(h.recommended_fix)}</div>
    <div class="pc" style="color:var(--dim);font-style:italic">${esc(h.deploy_note)}</div></div>`;
}

function select(rank, fromCard){
  selected=rank;
  const h=DATA.hotspots.find(x=>x.rank===rank); if(!h) return;
  const mk=markers[rank];
  if(mk){
    if(fromCard) map.flyTo([h.lat,h.lon], Math.max(map.getZoom(),15), {duration:.6});
    mk.openPopup();
    Object.values(markers).forEach(m=>m._path&&m._path.classList.remove("sel"));
    if(mk._path) mk._path.classList.add("sel");
  }
  markCard(rank);
}
function markCard(rank){
  document.querySelectorAll(".card").forEach(c=>c.classList.toggle("sel",+c.dataset.rank===rank));
  const el=document.querySelector(`.card[data-rank="${rank}"]`);
  if(el) el.scrollIntoView({block:"nearest",behavior:"smooth"});
}
function esc(s){return (s==null?"":String(s)).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));}
</script>
