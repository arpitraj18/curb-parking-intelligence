<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CURB — Priorities</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Geist:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="assets/curb.css?v=59">
  <style>
    .plan-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(165px, 1fr));
      gap: 10px
    }

    .plan-item {
      border: 1px solid var(--hairline-soft);
      border-radius: 8px;
      padding: 11px 13px;
      cursor: pointer;
      transition: border-color .16s var(--ease), background .16s var(--ease);
      background: var(--surface)
    }

    .plan-item:hover {
      border-color: var(--dim)
    }

    .plan-item.on {
      border-color: var(--amber-strong);
      background: var(--raised)
    }

    .plan-item .pn {
      font-family: "JetBrains Mono", monospace;
      font-size: 22px;
      font-weight: 500;
      line-height: 1
    }

    .plan-item .pl {
      font-size: 11px;
      color: var(--muted);
      margin: 5px 0 8px;
      line-height: 1.3;
      min-height: 28px
    }

    .plan-item .pbar {
      height: 4px;
      background: var(--raised2);
      border-radius: 3px;
      overflow: hidden
    }

    .plan-item .pbar span {
      display: block;
      height: 100%;
      background: var(--amber-strong)
    }
  </style>
</head>

<body data-page="priorities">
  <div id="curb-header"></div>

  <div class="page page-wide">

    <div class="panel" style="margin:0 0 18px">
      <p class="eyebrow" style="margin-bottom:10px">Deployment plan · what the top 100 priority spots need</p>
      <div class="plan-grid" id="planGrid"></div>
    </div>

    <div style="display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;margin:0 0 18px">
      <div class="chips" id="causeChips" style="flex:1;min-width:280px"></div>
      <input class="search" id="search" placeholder="Search junction or area…" style="width:240px;margin:0">
    </div>

    <table class="dtable">
      <thead>
        <tr>
          <th data-sort="rank"># <span class="material-symbols-outlined">unfold_more</span></th>
          <th data-sort="name">Hotspot</th>
          <th data-sort="root_cause">Cause</th>
          <th data-sort="congestion_impact_index" class="num">Impact</th>
          <th data-sort="persistence_tier">Persistence</th>
          <th data-sort="trend">Trend</th>
          <th>Recommended fix</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <p class="caveat">Impact is a normalised index (severity × vehicle footprint), not measured traffic. Click a row for
      the full hotspot profile.</p>
  </div>

  <script src="assets/curb-data.js"></script>
  <script src="assets/curb-app.js"></script>
  <script src="assets/curb-nav.js"></script>
  <script>
    (function () {
      var D = window.CURB, X = window.CURBX;
      var causes = Object.keys(X.CAUSE), fCause = [], q = "", sortKey = "rank", sortAsc = true, fixFilter = null;

      document.getElementById("causeChips").innerHTML = causes.map(function (c) {
        return '<span class="chip" data-v="' + c + '"><span class="dot" style="background:' + X.causeHex(c) + '"></span>' + X.esc(c) + '</span>';
      }).join("");
      document.querySelectorAll("#causeChips .chip").forEach(function (el) {
        el.onclick = function () {
          var v = el.dataset.v, i = fCause.indexOf(v);
          if (i >= 0) { fCause.splice(i, 1); el.classList.remove("on"); el.style.cssText = ""; }
          else { fCause.push(v); el.classList.add("on"); el.style.cssText = "border-color:" + X.causeHex(v) + "99;background:" + X.causeHex(v) + "22"; }
          render();
        };
      });
      document.getElementById("search").addEventListener("input", function (e) { q = e.target.value; render(); });
      document.querySelectorAll("th[data-sort]").forEach(function (th) {
        th.onclick = function () { var k = th.dataset.sort; if (sortKey === k) sortAsc = !sortAsc; else { sortKey = k; sortAsc = (k === "rank"); } render(); };
      });

      var max = Math.max.apply(null, D.hotspots.map(function (h) { return h.congestion_impact_index; }));

      // deployment plan: top-100 grouped by recommended fix; click to filter the table
      (function buildPlan() {
        var t100 = D.hotspots.filter(function (h) { return h.rank <= 100; }), groups = {};
        t100.forEach(function (h) { groups[h.recommended_fix] = (groups[h.recommended_fix] || 0) + 1; });
        var entries = Object.keys(groups).map(function (f) { return { fix: f, n: groups[f] }; }).sort(function (a, b) { return b.n - a.n; });
        var pmax = Math.max.apply(null, entries.map(function (e) { return e.n; })) || 1;
        document.getElementById("planGrid").innerHTML = entries.map(function (e) {
          return '<div class="plan-item" data-fix="' + X.esc(e.fix) + '"><div class="pn">' + e.n + '</div>' +
            '<div class="pl">' + X.esc(e.fix) + '</div>' +
            '<div class="pbar"><span style="width:' + (e.n / pmax * 100) + '%"></span></div></div>';
        }).join("");
        document.querySelectorAll("#planGrid .plan-item").forEach(function (el) {
          el.onclick = function () {
            var f = el.dataset.fix;
            if (fixFilter === f) { fixFilter = null; el.classList.remove("on"); }
            else { fixFilter = f; document.querySelectorAll("#planGrid .plan-item").forEach(function (x) { x.classList.toggle("on", x === el); }); }
            render();
          };
        });
      })();

      function go(rank) { var h = D.hotspots.filter(function (x) { return x.rank === +rank; })[0]; X.detail(h); }

      function render() {
        var rows = D.hotspots.filter(function (h) {
          if (fCause.length && fCause.indexOf(h.root_cause) < 0) return false;
          if (fixFilter && h.recommended_fix !== fixFilter) return false;
          if (q && (h.name || "").toLowerCase().indexOf(q.toLowerCase()) < 0) return false;
          return true;
        });
        rows.sort(function (a, b) {
          var x = a[sortKey], y = b[sortKey];
          if (typeof x === "string") { x = x.toLowerCase(); y = (y || "").toLowerCase(); }
          return (x < y ? -1 : x > y ? 1 : 0) * (sortAsc ? 1 : -1);
        });
        document.getElementById("rows").innerHTML = rows.map(function (h) {
          var hex = X.causeHex(h.root_cause);
          return '<tr data-rank="' + h.rank + '">' +
            '<td class="num" style="color:var(--dim)">' + h.rank + '</td>' +
            '<td>' + X.esc(X.cleanName(h.name)) + '</td>' +
            '<td><span class="cause-dot" style="background:' + hex + '"></span>' + X.esc(h.root_cause) + '</td>' +
            '<td class="num"><div style="display:flex;align-items:center;justify-content:flex-end;gap:8px;white-space:nowrap"><span>' + Math.round(h.congestion_impact_index) + '</span>' +
            '<span class="bar" style="flex:none"><span style="width:' + (h.congestion_impact_index / max * 100) + '%;background:' + hex + '"></span></span></div></td>' +
            '<td><span class="pill ' + h.persistence_tier + '" style="margin:0">' + h.persistence_tier + '</span></td>' +
            '<td><span class="badge ' + h.trend + '" style="margin:0">' + h.trend + '</span></td>' +
            '<td style="color:var(--muted)">' + X.esc(h.recommended_fix) + '</td>' +
            '</tr>';
        }).join("");
        document.querySelectorAll("#rows tr").forEach(function (tr) { tr.onclick = function () { go(tr.dataset.rank); }; });
      }
      render();
    })();
  </script>
</body>

</html>
