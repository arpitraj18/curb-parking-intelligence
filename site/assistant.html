<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CURB — Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Geist:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/curb.css">
</head>
<body data-page="assistant">
<div id="curb-header"></div>

<div class="page">

  <div class="chatwrap">
    <div class="msgs" id="msgs"></div>
    <div class="sugg-label" id="suggLabel">Try asking:</div>
    <div class="sugg" id="sugg"></div>
    <div class="askbar">
      <input id="q" placeholder="e.g. top delivery hotspots, or chronic safety spots near HSR" autocomplete="off">
      <button id="send">Ask</button>
    </div>
  </div>
</div>

<script src="assets/curb-data.js"></script>
<script src="assets/curb-app.js"></script>
<script src="assets/curb-nav.js"></script>
<script>
(function(){
  var X=window.CURBX;
  var msgs=document.getElementById("msgs"), input=document.getElementById("q");
  var suggEl=document.getElementById("sugg"), suggLabel=document.getElementById("suggLabel");
  var SUGG=["Top 5 delivery hotspots","Chronic safety spots","Emerging commuter spots","Worst 5 overall"];
  var asked=false;

  // Render suggestions immediately so they're visible before any question
  suggEl.innerHTML=SUGG.map(function(s){return '<span class="s">'+s+'</span>';}).join("");
  suggEl.querySelectorAll(".s").forEach(function(s){s.onclick=function(){ask(s.textContent);};});

  function hideSugg(){
    if(!asked){ asked=true; suggEl.style.display="none"; suggLabel.style.display="none"; }
  }

  function bubble(who,html,noScroll){
    var d=document.createElement("div"); d.className="msg "+who+" fade-in";
    d.innerHTML='<div class="av">'+(who==="bot"?"AI":"You")+'</div><div class="body">'+html+'</div>';
    msgs.appendChild(d);
    if(!noScroll) msgs.scrollTop = msgs.scrollHeight;
    return d;
  }
  function go(rank){document.body.classList.remove("curb-ready");setTimeout(function(){location.href="map.html?focus="+rank;},200);}

  // normalise either schema (full hotspot OR compact API row) into one shape
  function norm(h){return {rank:h.rank, name:X.cleanName(h.name), cause:h.root_cause||h.cause,
    impact:Math.round(h.congestion_impact_index!=null?h.congestion_impact_index:h.impact),
    tier:h.persistence_tier||h.persistence, fix:h.recommended_fix||h.fix};}
  function cards(rows){
    return '<div style="margin-top:6px">'+rows.map(function(r){var h=norm(r);
      return '<div class="res" data-rank="'+h.rank+'" style="--cc:'+X.causeVar(h.cause)+'">'+
        '<div class="rn">#'+h.rank+' · '+X.esc(h.name)+'</div>'+
        '<div class="rc">'+X.esc(h.cause)+' · impact '+h.impact+' · '+h.tier+'</div>'+
        '<div class="rl">→ '+X.esc(h.fix)+' · open on map</div></div>';
    }).join("")+'</div>';
  }
  function renderResults(node, answer, rows){
    var html = X.esc(answer);
    if(rows && rows.length) html += cards(rows);
    node.querySelector(".body").innerHTML=html;
    node.querySelectorAll(".res").forEach(function(r){r.onclick=function(){go(r.dataset.rank);};});
  }
  function deterministic(q, node){
    var res=X.query(q).map(norm);
    if(!res.length){ node.querySelector(".body").innerHTML="I couldn't find matching hotspots. Try a cause (delivery, safety, commuter, hire) or a different area."; return; }
    var t=res[0];
    var answer="Here "+(res.length===1?"is":"are")+" the top "+res.length+" by obstruction impact — leading with "+
      t.name+" ("+t.cause.toLowerCase()+", impact "+t.impact+").";
    renderResults(node, answer, res);
  }

  bubble("bot","I read CURB's priority list. Ask where to focus — by cause (delivery, safety, commuter, hire), by area, by trend, or just the worst spots. Every number comes straight from the data.", true);

  function ask(text){
    var q=(text||input.value).trim(); if(!q)return; input.value=""; hideSugg();
    bubble("me",X.esc(q));
    var typing=bubble("bot",'<span class="typing"><span></span><span></span><span></span></span>');

    // Try the live GenAI endpoint; fall back to deterministic phrasing on any failure.
    fetch("api/assistant",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({question:q})})
      .then(function(r){ if(!r.ok) throw new Error("status "+r.status); return r.json(); })
      .then(function(d){
        if(d && d.answer){ renderResults(typing, d.answer, d.results||[]); }
        else { deterministic(q, typing); }
      })
      .catch(function(){ deterministic(q, typing); });
  }
  document.getElementById("send").onclick=function(){ask();};
  input.addEventListener("keydown",function(e){if(e.key==="Enter")ask();});
})();
</script>
</body></html>
