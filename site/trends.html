<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CURB — Trends</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Geist:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="assets/curb.css?v=58">
</head>
<body data-page="trends">
<div id="curb-header"></div>

<div class="page page-wide">

  <div class="note-chip" id="validity"></div>

  <div class="tiles" style="grid-template-columns:repeat(3,1fr);margin-top:20px" id="trendTiles"></div>

  <div class="panel" style="margin-top:26px">
    <p class="eyebrow">First half vs second half — above the line is rising</p>
    <div id="scatter" style="position:relative;height:340px;margin-top:10px"></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:26px;margin-top:26px">
    <div>
      <h2 class="section-h" style="color:var(--emerging)">Top Emerging</h2>
      <div id="emerging"></div>
    </div>
    <div>
      <h2 class="section-h" style="color:var(--cooling)">Top Cooling</h2>
      <div id="cooling"></div>
    </div>
  </div>
  <p class="caveat">A retrospective trend over the data window, measured relative to the flat citywide baseline — not a forecast. Provided dataset only; hour-of-day not used.</p>
</div>

<script src="assets/curb-data.js"></script>
<script src="assets/curb-app.js"></script>
<script src="assets/curb-nav.js"></script>
<script>
(function(){
  var D=window.CURB, X=window.CURBX, T=D.trends, m=T.meta;
  var stable=m.cells_assessed-m.emerging-m.cooling;

  document.getElementById("validity").innerHTML=
    '<span class="material-symbols-outlined" style="font-size:14px">verified</span>'+
    'Citywide second/first ratio '+m.city_second_over_first+' — flat baseline, trends are real';

  var tiles=[{v:m.emerging,k:"Emerging",c:"#E5564B",ic:"arrow_upward"},
             {v:stable,k:"Stable",c:"var(--stable)",ic:"horizontal_rule"},
             {v:m.cooling,k:"Cooling",c:"#4C9BE6",ic:"arrow_downward"}];
  document.getElementById("trendTiles").innerHTML=tiles.map(function(t){
    return '<div class="tile"><div class="v" style="color:'+t.c+'">'+t.v+'</div>'+
      '<div class="k"><span class="material-symbols-outlined" style="font-size:13px;vertical-align:middle;color:'+t.c+'">'+t.ic+'</span> '+t.k+'</div></div>';
  }).join("");

  // scatter from emerging + cooling rows (first vs second)
  var pts=T.emerging.map(function(r){return {x:r.first,y:r.second,t:"Emerging"};})
    .concat(T.cooling.map(function(r){return {x:r.first,y:r.second,t:"Cooling"};}));
  var mx=Math.max.apply(null,pts.map(function(p){return Math.max(p.x,p.y);}))||1;
  var col={Emerging:"#E5564B",Cooling:"#4C9BE6"};
  var sc=document.getElementById("scatter"), W=sc.clientWidth||900, H=330, pad=34;
  function px(v){return pad+v/mx*(W-pad*2);} function py(v){return H-pad-v/mx*(H-pad*2);}
  var svg='<svg width="100%" height="'+H+'" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none">';
  svg+='<line x1="'+pad+'" y1="'+(H-pad)+'" x2="'+(W-pad)+'" y2="'+pad+'" stroke="#504535" stroke-dasharray="4 4"/>';
  svg+='<line x1="'+pad+'" y1="'+pad+'" x2="'+pad+'" y2="'+(H-pad)+'" stroke="#3a3225"/>';
  svg+='<line x1="'+pad+'" y1="'+(H-pad)+'" x2="'+(W-pad)+'" y2="'+(H-pad)+'" stroke="#3a3225"/>';
  pts.forEach(function(p){svg+='<circle cx="'+px(p.x)+'" cy="'+py(p.y)+'" r="3.2" fill="'+col[p.t]+'" fill-opacity=".6"/>';});
  svg+='</svg>';
  svg+='<span class="mono" style="position:absolute;bottom:6px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase">First-half citations</span>';
  svg+='<span class="mono" style="position:absolute;left:2px;top:50%;transform:rotate(-90deg);font-size:9px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase">Second-half</span>';
  sc.innerHTML=svg;

  function trendList(el,rows,hex,sign){
    document.getElementById(el).innerHTML=rows.slice(0,8).map(function(r){
      var pct=Math.round((r.second-r.first)/Math.max(r.first,1)*100);
      var w=Math.min(Math.abs(pct),100);
      return '<div class="hcard" style="--cc:'+hex+';grid-template-columns:1fr auto;cursor:default">'+
        '<div><div class="nm">'+X.esc(X.cleanName(r.name))+'</div>'+
        '<div class="fix mono">'+r.first+' → '+r.second+' citations</div></div>'+
        '<div style="text-align:right"><div class="mono" style="font-size:16px;color:'+hex+'">'+(pct>0?"+":"")+pct+'%</div>'+
        '<div class="bar" style="width:80px;margin-top:4px"><span style="width:'+w+'%;background:'+hex+'"></span></div></div></div>';
    }).join("");
  }
  trendList("emerging",T.emerging,"#E5564B");
  trendList("cooling",T.cooling,"#4C9BE6");
})();
</script>
</body></html>
